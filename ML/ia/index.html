<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Pagina de IA</title>
</head>

<body>
    <div class="app">
        <section class="productos">
            <div class="cargando">
                <span>Terminá de responder las preguntas...</span>
            </div>
            <div id="listo" class="oculto">
                <div id="header" style="padding-left: 60px;">
                    <span style="font-size: 20px;" id="titleHeader">Cargando...</span>
                    <div id="contenedorCarritoBtn" style="position: relative;">
                        <a href="/ML/carrito.html" class="button" style="background-color: #f6d850;">
                            <img src="../images/ia/shopping-cart.png" width="20px" height="20px" alt="carrito" />
                        </a>
                    </div>
                </div>
                <div id="ingredientes"></div>
                <div id="productos-container"></div>
            </div>
        </section>

        <section class="chat">
            <a href="/index.html" class="button" style="background-color: #f6d850; position: absolute; left: 12px; top: 12px;">
                <img src="../images/ia/circle-arrow-left.png" width="20px" height="20px" alt="carrito" />
            </a>
            <div id="container-title">
                <img src="../images/ia/personaje.png" alt="IA Icon" id="img-personaje">
                <span id="title">¿En qué puedo ayudarte hoy?</span>
            </div>
            <div id="header-chat">
                <div id="container-img">
                    <img id="img" src="../images/ia/personaje-chat.png" alt="IA Icon">
                </div>
            </div>
            <div id="container-msj"></div>
            <div id="container-input">
                <textarea placeholder="Escribí tu pregunta acá..." class="input" id="input-mensaje"></textarea>
                <button id="boton-enviar" class="button">
                    <img src="../images/ia/send.png" width="20px" height="20px" alt="carrito" />
                </button>
            </div>
        </section>
    </div>
    <script src="index.js"></script>
</body>

</html>
